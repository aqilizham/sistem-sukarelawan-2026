<!doctype html>
<html lang="ms">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistem Sukarelawan 2026</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="icons.js"></script>
    <script defer src="supabase-config.js"></script>
    <script defer src="supabase-client.js"></script>
    <script defer src="auth.js"></script>
    <script defer src="services.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div id="authRoot" class="auth-root" hidden></div>

    <div class="app-shell" id="appShell" hidden>
      <aside class="sidebar" aria-label="Navigasi utama">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div>
            <strong>Sistem Sukarelawan</strong>
            <span>2026</span>
          </div>
        </div>

        <nav class="nav-list" id="navList">
          <button class="nav-item active" data-view="overview">
            <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
          </button>
          <button class="nav-item" data-view="applications">
            <i data-lucide="clipboard-list"></i><span>Permohonan</span>
          </button>
          <button class="nav-item" data-view="screening">
            <i data-lucide="shield-check"></i><span>Saringan</span>
          </button>
          <button class="nav-item" data-view="placement">
            <i data-lucide="map-pin"></i><span>Penempatan</span>
          </button>
          <button class="nav-item" data-view="schedule">
            <i data-lucide="calendar-days"></i><span>Jadual & Latihan</span>
          </button>
          <button class="nav-item" data-view="kit">
            <i data-lucide="badge-check"></i><span>Kit & Akreditasi</span>
          </button>
          <button class="nav-item" data-view="attendance">
            <i data-lucide="scan-line"></i><span>Kehadiran</span>
          </button>
          <button class="nav-item" data-view="support">
            <i data-lucide="messages-square"></i><span>Aduan & Sokongan</span>
          </button>
          <button class="nav-item" data-view="addons">
            <i data-lucide="blocks"></i><span>Sistem Tambahan</span>
          </button>
          <button class="nav-item" data-view="reports">
            <i data-lucide="file-bar-chart"></i><span>Sijil & Laporan</span>
          </button>
          <button class="nav-item" data-view="users" id="usersNavItem" hidden>
            <i data-lucide="users-round"></i><span>Pengurusan Pengguna</span>
          </button>
        </nav>

        <div class="sidebar-foot">
          <span>Kluster aktif</span>
          <strong>Kuala Lumpur</strong>
          <small>Sasaran operasi: 5,000 sukarelawan</small>
        </div>
      </aside>

      <div class="main-column">
        <header class="topbar">
          <button class="icon-button menu-toggle" id="menuToggle" aria-label="Buka menu">
            <i data-lucide="menu"></i>
            <span class="fallback-symbol" aria-hidden="true">&#9776;</span>
          </button>

          <div class="page-title">
            <span id="viewKicker">Operasi berpusat</span>
            <h1 id="viewTitle">Dashboard</h1>
          </div>

          <label class="search-box">
            <i data-lucide="search"></i>
            <input id="globalSearch" type="search" placeholder="Cari nama, ID, venue, unit">
          </label>

          <div class="top-controls">
            <label>
              <span>Peranan sebenar</span>
              <input id="roleDisplay" type="text" readonly value="-">
            </label>
            <label>
              <span>Skop kluster</span>
              <select id="clusterSelect">
                <option>Semua</option>
                <option>Kuala Lumpur</option>
                <option>Selangor</option>
                <option>Putrajaya</option>
                <option>Johor</option>
              </select>
            </label>
            <button class="ghost-button" id="logoutButton" type="button">
              <i data-lucide="log-out"></i>Logout
            </button>
          </div>
        </header>

        <main class="content" id="app" tabindex="-1"></main>
      </div>
    </div>

    <dialog class="modal" id="passModal">
      <div class="modal-head">
        <h2>Pas Akreditasi</h2>
        <button class="icon-button" id="closeModal" aria-label="Tutup">
          <i data-lucide="x"></i>
          <span class="fallback-symbol" aria-hidden="true">&times;</span>
        </button>
      </div>
      <div id="modalBody"></div>
    </dialog>
  </body>
</html>
